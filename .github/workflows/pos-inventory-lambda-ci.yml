name: POS and Inventory Lambda CI

on:
  push:
    branches:
      - feature/pos-inventory-lambda-validations

jobs:
  pos-lambda-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Lint POS Lambda Code (basic flake8 check)
        run: |
          pip install flake8
          flake8 pipelines/POS/lambda_fn/pos-validation-fn.py --max-line-length=120 --ignore=E203,W503

      - name: Syntax Check
        run: |
          python -m py_compile pipelines/pos/lambda_fn/pos-validation-fn.py
          python -m py_compile pipelines/inventory/lambda_fn/inventory-validation-fn.py

      # OPTIONAL: Add unit tests here if needed
      # - name: Run Unit Tests
      #   run: |
      #     pytest tests/

