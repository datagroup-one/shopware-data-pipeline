#           python -m pip install --upgrade pip
#           pip install pytest flake8
#           if [ -f pipelines/web_traffic/lambda_fn/requirements.txt ]; then
#             pip install -r pipelines/web_traffic/lambda_fn/requirements.txt
#           fi
          
#       - name: Lint Web Traffic Lambda code
#         run: |
#           flake8 pipelines/web_traffic/lambda_fn/ --max-line-length=120 --ignore=E203,W503 --exclude=tests
          
      - name: Run Web Traffic Lambda tests
        run: |
          if [ -d "pipelines/web_traffic/lambda_fn/tests" ]; then
            pytest pipelines/web_traffic/lambda_fn/tests --disable-warnings -v
          else
            echo "No Web Traffic tests found, skipping..."
          fi

  # Job 3: Test POS and Inventory Lambda Functions
  test-pos-inventory-lambda:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt || true
          fi
          
      - name: Lint POS Lambda code
        run: |
          flake8 pipelines/pos/lambda_fn/pos-validation-fn.py --max-line-length=120 --ignore=E203,W503
          
      - name: Lint Inventory Lambda code
        run: |
          flake8 pipelines/inventory/lambda_fn/inventory-validation-fn.py --max-line-length=120 --ignore=E203,W503
          
      - name: Syntax check POS Lambda
        run: |
          python -m py_compile pipelines/pos/lambda_fn/pos-validation-fn.py
          
      - name: Syntax check Inventory Lambda
        run: |
          python -m py_compile pipelines/inventory/lambda_fn/inventory-validation-fn.py

