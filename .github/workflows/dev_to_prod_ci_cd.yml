#           if [ -f pipelines/crm_interaction/lambda_fn/requirements.txt ]; then
#             pip install -r pipelines/crm_interaction/lambda_fn/requirements.txt
#           fi
          
      - name: Lint CRM Lambda code
        run: |
          flake8 pipelines/crm_interaction/lambda_fn/ --max-line-length=120 --ignore=E203,W503 --exclude=tests
          
      - name: Run CRM Lambda tests
        run: |
          if [ -d "pipelines/crm_interaction/lambda_fn/tests" ]; then
            pytest pipelines/crm_interaction/lambda_fn/tests --disable-warnings -v
          else
            echo "No CRM tests found, skipping..."
          fi

