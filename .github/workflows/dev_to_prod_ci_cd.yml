# .github/workflows/unified-cicd-pipeline.yml
name: Unified CI/CD Pipeline - Dev to Production

on:
  # Trigger on push to dev branch
  push:
    branches: [ dev, dev2 ]
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      deploy_to_prod:
        description: 'Deploy to production after tests pass'
        required: false
        type: boolean
        default: true
      service:
        description: 'Service to deploy (for ECS deployment)'
        required: false
        type: choice
        options:
          - crm
          - web
          - both
        default: both

env:
  AWS_REGION: eu-west-1 # Primary region for production
  DEV_AWS_REGION: eu-west-1  # Dev region from your existing workflow
  ENVIRONMENT: dev

jobs:
  # ============================================================================
  # TESTING PHASE - Run all tests from existing workflows
  # ============================================================================
  
