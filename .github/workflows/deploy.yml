name: Deploy Services

on:
  push:
    branches: [feature/ecs]
    paths:
      - 'pipelines/crm_interaction/crm_container/**'
      - 'pipelines/web_traffic/web_container/**'
      - 'config/**'
      - 'deploy/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - crm
          - web
          - both
        default: both

env:
  AWS_REGION: eu-west-1
  ENVIRONMENT: dev

jobs:
  # Separate job to determine which services to deploy
  prepare:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - name: Determine services to deploy
        id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.service }}" in
              "both")
                echo 'services=["crm", "web"]' >> $GITHUB_OUTPUT
                ;;
              "crm")
                echo 'services=["crm"]' >> $GITHUB_OUTPUT
                ;;
              "web")
                echo 'services=["web"]' >> $GITHUB_OUTPUT
                ;;
              *)
                echo 'services=["crm", "web"]' >> $GITHUB_OUTPUT
                ;;
            esac
          else
            # For push events, deploy both services
            echo 'services=["crm", "web"]' >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.services) }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Make build script executable
      run: chmod +x deploy/build.sh
    
    - name: Deploy ${{ matrix.service }} service
      run: |
        echo "Deploying service: ${{ matrix.service }} to environment: ${{ env.ENVIRONMENT }}"
        ./deploy/build.sh ${{ matrix.service }} ${{ env.ENVIRONMENT }}
    
    - name: Verify deployment
      run: |
        SERVICE_NAME=${{ matrix.service }}-service-${{ env.ENVIRONMENT }}
        CLUSTER_NAME=data-pipeline-cluster-${{ env.ENVIRONMENT }}
        
        SERVICE_STATUS=$(aws ecs describe-services \
          --cluster $CLUSTER_NAME \
          --services $SERVICE_NAME \
          --query 'services[0].{Running:runningCount,Desired:desiredCount,Status:status}')
        
        echo "Service Status: $SERVICE_STATUS"