name: CRM Lambda Transformation CI

on:
  pull_request:
    branches:
      - '**'
    paths:
      - 'pipelines/crm-interaction/lambda-fn/**'
      - 'requirements.txt'
      - '.github/workflows/**'
    types: [opened, synchronize, reopened]

jobs:
  test-crm-lambda:
    if: github.head_ref == 'feature/crm-transformation'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r pipelines/crm-interaction/lambda-fn/requirements.txt

      - name: Run unit tests
        run: pytest pipelines/crm-interaction/lambda-fn/tests --disable-warnings -v
